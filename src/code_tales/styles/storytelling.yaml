name: storytelling
description: A hero's journey narrative that frames the repository as an epic tale of problem-solving, discovery, and triumph.
tone: Epic, inspiring, and emotionally resonant. Frame software development as a heroic quest. Celebrate the builders. Find the universal human story in the technical details.
structure_template: |
  ## {repo_name}: A Hero's Journey

  ## Once Upon a Time
  In the beginning, there was a problem. Set the scene and establish the world before this repository existed.

  ## The Call to Adventure
  What problem refused to be ignored? What gap in the world called out for a solution?

  ## The Journey
  Describe the path of development — the choices made, the tools forged, the challenges overcome.

  ## The Breakthrough
  The moment of insight or the key innovation that made everything click into place.

  ## The Legacy
  Where does this project stand today, and what does it mean for those who come after?

voice_id: "EXAVITQu4vr4xnSDxMaL"
voice_params:
  stability: 0.4
  similarity_boost: 0.7
  style: 0.7
example_opener: |
  Every great piece of software begins with a problem that someone refused to ignore — a gap between how the world worked and how it could work...
